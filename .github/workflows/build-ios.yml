name: 📱 Build ObsidianOS + Amethyst iOS (.ipa)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS IPA with Embedded Amethyst Module
    runs-on: macos-latest

    steps:
      - name: 📦 Checkout ObsidianOS Repository
        uses: actions/checkout@v4

      - name: 📦 Checkout Amethyst-iOS
        uses: actions/checkout@v4
        with:
          repository: AngelAuraMC/Amethyst-iOS
          path: Amethyst-iOS
          submodules: recursive # Necessario per scaricare i natives arm64 inclusi come sottomoduli

      - name: ☕ Setup Java 8
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          architecture: x64

      - name: 🏗️ Setup Native Dependencies
        run: |
          brew install make cmake ldid wget llvm coreutils
          
          # Symlink gmake & nproc (Required by Amethyst-iOS Makefile)
          sudo mkdir -p /usr/local/bin
          if [ -d /opt/homebrew/bin ]; then
            sudo ln -sf /opt/homebrew/bin/gmake /usr/local/bin/gmake
            sudo ln -sf $(which gnproc 2>/dev/null || which nproc 2>/dev/null || echo /usr/bin/true) /usr/local/bin/nproc 2>/dev/null || true
          else
            # Intel runners
            sudo ln -sf /usr/local/bin/gmake /usr/local/bin/gmake
            sudo ln -sf $(which gnproc 2>/dev/null || which nproc 2>/dev/null || echo /usr/bin/true) /usr/local/bin/nproc 2>/dev/null || true
          fi
          
          # Add LLVM/lld to path
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: 🏗️ Compile Amethyst Framework
        run: |
          cd Amethyst-iOS
          PROJECT_NAME=$(ls | grep "\.xcodeproj" | head -n 1)
          
          # Find the first available scheme
          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_NAME" | sed -n '/Schemes:/,$p' | sed '1d' | sed 's/^[[:space:]]*//' | head -n 1)
          
          if [ -z "$SCHEME_NAME" ]; then
            echo "⚠️ No schemes found, falling back to Target detection..."
            NAME=$(xcodebuild -list -project "$PROJECT_NAME" | sed -n '/Targets:/,$p' | sed '1d' | sed 's/^[[:space:]]*//' | head -n 1)
            FLAG="-target"
          else
            echo "✅ Detected Scheme: $SCHEME_NAME"
            NAME="$SCHEME_NAME"
            FLAG="-scheme"
          fi

          echo "🚀 Starting build with: $FLAG \"$NAME\""
          
          # Force the use of Java 8 installed by setup-java
          export JAVA_HOME=${{ steps.setup-java.outputs.path }}
          export BOOTJDK=$JAVA_HOME/bin
          export PATH="$BOOTJDK:$PATH"
          java -version
          
          # Patch ALL brittle Makefile dependency checks that fail on ARM64 MacOS
          # This replaces all $(error You need to install ...) with $(info ...)
          sed -i '' 's/\$(error You need to install/$(info Bypassing check: You need to install/g' Makefile
          
          # Fix the specific version check for Java which is also brittle
          sed -i '' 's/ifeq (\$(filter 1.8.0/ifneq (1.8.0,1.8.0/g' Makefile
          
          # Patch JavaLauncher.m to include missing mach header (Required for Apple Silicon/Mach ports)
          printf '#include <mach/mach.h>\n' | cat - Natives/JavaLauncher.m > /tmp/jl_patched.m && mv /tmp/jl_patched.m Natives/JavaLauncher.m
          
          # DEFINITIVE FIX for private Apple symbol __UISolariumEnabled:
          # Strategy: replace ALL references with literal 0 so the symbol is never referenced.
          # We cannot define it ourselves because Apple private headers re-declare it as 'extern BOOL',
          # which conflicts with any 'int' definition and confuses the linker.
          sed -i '' 's/__UISolariumEnabled/0/g' Natives/LauncherNavigationController.m
          sed -i '' 's/__UISolariumEnabled/0/g' Natives/PickTextField.m
          
          # Verify the patches worked (will print WARNING if symbol is still present)
          grep -q '__UISolariumEnabled' Natives/LauncherNavigationController.m && echo "WARNING: Symbol still in LauncherNavigationController.m!" || echo "OK: LauncherNavigationController.m patched"
          grep -q '__UISolariumEnabled' Natives/PickTextField.m && echo "WARNING: Symbol still in PickTextField.m!" || echo "OK: PickTextField.m patched"
          
          # CRITICAL FIX: patch CMakeLists.txt to build a SHARED LIBRARY (MH_DYLIB) instead of
          # an executable (MH_EXECUTE). The original cmake uses add_executable which produces
          # an app binary that cannot be linked as a framework by Xcode.
          # After this patch, cmake outputs libAngelAuraAmethyst.dylib instead of AngelAuraAmethyst.app
          sed -i '' 's/add_executable(AngelAuraAmethyst/add_library(AngelAuraAmethyst SHARED/g' Natives/CMakeLists.txt || \
            sed -i 's/add_executable(AngelAuraAmethyst/add_library(AngelAuraAmethyst SHARED/g' Natives/CMakeLists.txt
          grep -q 'add_library(AngelAuraAmethyst SHARED' Natives/CMakeLists.txt && echo 'OK: CMakeLists patched to SHARED library' || echo 'WARNING: cmake patch may have failed'
          
          # Add -undefined dynamic_lookup linker flag for remaining undefined Apple private symbols
          python3 -c "import re; f=open('Natives/CMakeLists.txt','r'); c=f.read(); f.close(); flag='target_link_options(AngelAuraAmethyst PRIVATE -Wl,-undefined,dynamic_lookup)\n'; c=re.sub(r'(target_link_libraries\s*\(\s*AngelAuraAmethyst)', flag+r'\1', c, count=1) if 'undefined,dynamic_lookup' not in c and 'AngelAuraAmethyst' in c else c; f=open('Natives/CMakeLists.txt','w'); f.write(c); f.close(); print('CMakeLists.txt patched with dynamic_lookup')" || echo 'CMakeLists.txt python patch skipped'
          
          xcodebuild clean build -project "$PROJECT_NAME" "$FLAG" "$NAME" \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT=$PWD/build \
            MACH_O_TYPE=mh_dylib \
            LD_DYLIB_INSTALL_NAME=@rpath/Amethyst.dylib \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO
            
      - name: 🚚 Inject Amethyst.framework into Expo Module
        run: |
          mkdir -p modules/amethyst/ios/Frameworks
          FWDIR=modules/amethyst/ios/Frameworks/Amethyst.framework
          mkdir -p "$FWDIR"
          
          echo '=== Searching for Amethyst dylib (cmake SHARED library output) ==='
          # cmake with add_library(SHARED) outputs libAngelAuraAmethyst.dylib
          # This is the PRIMARY expected location after our CMakeLists.txt patch
          DYLIB_PATH=$(find Amethyst-iOS/Natives/build -name 'libAngelAuraAmethyst.dylib' 2>/dev/null | head -n 1)
          
          if [ -z "$DYLIB_PATH" ]; then
            echo 'Primary dylib not found, scanning all dylibs in build output...'
            find Amethyst-iOS -name '*.dylib' 2>/dev/null | head -20
            # Fallback: any dylib that is NOT a system library (no lib prefix except libAngelAura*)
            DYLIB_PATH=$(find Amethyst-iOS/build -name '*.dylib' 2>/dev/null \
              | grep -v 'libswift\|libmobile\|libspirv\|libAF\|libawt\|libtiny\|libz\|libxml\|libc\|libiconv' \
              | head -n 1)
          fi
          
          # Final validation: ensure the binary is MH_DYLIB, NOT MH_EXECUTE
          if [ -n "$DYLIB_PATH" ]; then
            FILE_TYPE=$(file "$DYLIB_PATH" 2>/dev/null)
            echo "Found: $DYLIB_PATH"
            echo "Type:  $FILE_TYPE"
            if echo "$FILE_TYPE" | grep -q 'dynamically linked shared library\|shared library'; then
              echo 'Binary type is MH_DYLIB - OK'
              cp "$DYLIB_PATH" "$FWDIR/Amethyst"
            elif echo "$FILE_TYPE" | grep -q 'executable'; then
              echo 'REJECTED: binary is MH_EXECUTE (executable), cannot be linked as framework'
              echo 'Trying other candidates...'
              DYLIB_PATH=''
            fi
          fi
          
          if [ -z "$DYLIB_PATH" ] || [ ! -f "$FWDIR/Amethyst" ]; then
            echo 'ERROR: No valid MH_DYLIB found. Full build artifact listing:'
            find Amethyst-iOS -type f -name '*.dylib' 2>/dev/null
            find Amethyst-iOS -type f -name '*.a' 2>/dev/null
            exit 1
          fi
          
          # Write Info.plist for the framework bundle
          python3 -c "open('$FWDIR/Info.plist','w').write('<plist version=\"1.0\"><dict><key>CFBundleIdentifier</key><string>com.angelaura.amethyst</string><key>CFBundleName</key><string>Amethyst</string><key>CFBundlePackageType</key><string>FMWK</string><key>CFBundleShortVersionString</key><string>1.0</string><key>CFBundleVersion</key><string>1</string><key>MinimumOSVersion</key><string>16.0</string></dict></plist>')"
          
          echo 'Framework injection completed!'
          ls -la "$FWDIR/"
          file "$FWDIR/Amethyst"


      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 🔨 Install Expo & React Native Dependencies
        run: npm ci

      - name: 🛠️ Prebuild Expo iOS Project (Injecting Local Modules)
        run: npx expo prebuild --platform ios --clean

      - name: 🍏 Install CocoaPods (Link Amethyst.framework)
        run: |
          cd ios
          # Questo leggerà il nostro amethyst.podspec e farà l'Embed and Sign del framework
          pod install

      - name: 🏗️ Build Final ObsidianOS XCArchive
        run: |
          cd ios
          WORKSPACE_NAME=$(ls | grep "\.xcworkspace" | head -n 1)
          SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)
          
          xcodebuild archive \
            -workspace "$WORKSPACE_NAME" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath $PWD/build/ObsidianOS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: 📦 Package Sideload-Ready .ipa Payload
        run: |
          cd ios/build
          mkdir -p Payload
          
          # Cerchiamo l'applicazione generata ObsidianOS.app
          APP_DIR=$(ls ObsidianOS.xcarchive/Products/Applications/ | head -n 1)
          cp -R "ObsidianOS.xcarchive/Products/Applications/$APP_DIR" Payload/
          
          # Comprimiamo brutalmente il payload. AltStore ignorerà il CODE_SIGNING mancante firmando al volo.
          zip -r obsidian.ipa Payload

      - name: 📤 Upload Native .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidian
          path: ios/build/obsidian.ipa
          retention-days: 7