name: 📱 Build ObsidianOS + Amethyst iOS (.ipa)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS IPA with Embedded Amethyst Module
    runs-on: macos-latest

    steps:
      - name: 📦 Checkout ObsidianOS Repository
        uses: actions/checkout@v4

      - name: 📦 Checkout Amethyst-iOS
        uses: actions/checkout@v4
        with:
          repository: AngelAuraMC/Amethyst-iOS
          path: Amethyst-iOS
          submodules: recursive # Necessario per scaricare i natives arm64 inclusi come sottomoduli

      - name: ☕ Setup Java 8
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          architecture: x64

      - name: 🏗️ Setup Native Dependencies
        run: |
          brew install make cmake ldid wget llvm coreutils
          
          # Symlink gmake & nproc (Required by Amethyst-iOS Makefile)
          sudo mkdir -p /usr/local/bin
          if [ -d /opt/homebrew/bin ]; then
            sudo ln -sf /opt/homebrew/bin/gmake /usr/local/bin/gmake
            sudo ln -sf $(which gnproc 2>/dev/null || which nproc 2>/dev/null || echo /usr/bin/true) /usr/local/bin/nproc 2>/dev/null || true
          else
            # Intel runners
            sudo ln -sf /usr/local/bin/gmake /usr/local/bin/gmake
            sudo ln -sf $(which gnproc 2>/dev/null || which nproc 2>/dev/null || echo /usr/bin/true) /usr/local/bin/nproc 2>/dev/null || true
          fi
          
          # Add LLVM/lld to path
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: 🏗️ Compile Amethyst Framework
        run: |
          cd Amethyst-iOS
          PROJECT_NAME=$(ls | grep "\.xcodeproj" | head -n 1)
          
          # Find the first available scheme
          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_NAME" | sed -n '/Schemes:/,$p' | sed '1d' | sed 's/^[[:space:]]*//' | head -n 1)
          
          if [ -z "$SCHEME_NAME" ]; then
            echo "⚠️ No schemes found, falling back to Target detection..."
            NAME=$(xcodebuild -list -project "$PROJECT_NAME" | sed -n '/Targets:/,$p' | sed '1d' | sed 's/^[[:space:]]*//' | head -n 1)
            FLAG="-target"
          else
            echo "✅ Detected Scheme: $SCHEME_NAME"
            NAME="$SCHEME_NAME"
            FLAG="-scheme"
          fi

          echo "🚀 Starting build with: $FLAG \"$NAME\""
          
          # Force the use of Java 8 installed by setup-java
          export JAVA_HOME=${{ steps.setup-java.outputs.path }}
          export BOOTJDK=$JAVA_HOME/bin
          export PATH="$BOOTJDK:$PATH"
          java -version
          
          # Patch ALL brittle Makefile dependency checks that fail on ARM64 MacOS
          # This replaces all $(error You need to install ...) with $(info ...)
          sed -i '' 's/\$(error You need to install/$(info Bypassing check: You need to install/g' Makefile
          
          # Fix the specific version check for Java which is also brittle
          sed -i '' 's/ifeq (\$(filter 1.8.0/ifneq (1.8.0,1.8.0/g' Makefile
          
          # Patch JavaLauncher.m to include missing mach header (Required for Apple Silicon/Mach ports)
          printf '#include <mach/mach.h>\n' | cat - Natives/JavaLauncher.m > /tmp/jl_patched.m && mv /tmp/jl_patched.m Natives/JavaLauncher.m
          
          # DEFINITIVE FIX for private Apple symbol __UISolariumEnabled:
          # Strategy: replace ALL references with literal 0 so the symbol is never referenced.
          # We cannot define it ourselves because Apple private headers re-declare it as 'extern BOOL',
          # which conflicts with any 'int' definition and confuses the linker.
          sed -i '' 's/__UISolariumEnabled/0/g' Natives/LauncherNavigationController.m
          sed -i '' 's/__UISolariumEnabled/0/g' Natives/PickTextField.m
          
          # Verify the patches worked (will print WARNING if symbol is still present)
          grep -q '__UISolariumEnabled' Natives/LauncherNavigationController.m && echo "WARNING: Symbol still in LauncherNavigationController.m!" || echo "OK: LauncherNavigationController.m patched"
          grep -q '__UISolariumEnabled' Natives/PickTextField.m && echo "WARNING: Symbol still in PickTextField.m!" || echo "OK: PickTextField.m patched"
          
          # Safety net: patch CMakeLists.txt to add -undefined dynamic_lookup linker flag
          # This allows any remaining undefined private Apple symbols to be resolved at runtime
          python3 -c "import re; f=open('Natives/CMakeLists.txt','r'); c=f.read(); f.close(); flag='target_link_options(AngelAuraAmethyst PRIVATE -Wl,-undefined,dynamic_lookup)\n'; c=re.sub(r'(target_link_libraries\s*\(\s*AngelAuraAmethyst)', flag+r'\1', c, count=1) if 'undefined,dynamic_lookup' not in c and 'AngelAuraAmethyst' in c else c; f=open('Natives/CMakeLists.txt','w'); f.write(c); f.close(); print('CMakeLists.txt patched')" || echo "CMakeLists.txt python patch skipped"
          
          xcodebuild clean build -project "$PROJECT_NAME" "$FLAG" "$NAME" \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT=$PWD/build \
            MACH_O_TYPE=mh_dylib \
            LD_DYLIB_INSTALL_NAME=@rpath/Amethyst.dylib \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO
            
      - name: 🚚 Inject Amethyst.framework into Expo Module
        run: |
          # Creiamo la cartella target nel nostro Local Expo Module scritto precedentemente
          mkdir -p modules/amethyst/ios/Frameworks
          
          # Cerchiamo il framework compilato appena partorito da xcodebuild
          FRAMEWORK_PATH=$(find Amethyst-iOS/build -name "Amethyst.framework" -type d | head -n 1)
          
          if [ -z "$FRAMEWORK_PATH" ]; then
            echo "ERRORE CRITICO: Amethyst.framework non trovato post-compilazione!"
            exit 1
          fi
          
          cp -R "$FRAMEWORK_PATH" modules/amethyst/ios/Frameworks/
          echo "Framework 注入 completed: $FRAMEWORK_PATH"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 🔨 Install Expo & React Native Dependencies
        run: npm ci

      - name: 🛠️ Prebuild Expo iOS Project (Injecting Local Modules)
        run: npx expo prebuild --platform ios --clean

      - name: 🍏 Install CocoaPods (Link Amethyst.framework)
        run: |
          cd ios
          # Questo leggerà il nostro amethyst.podspec e farà l'Embed and Sign del framework
          pod install

      - name: 🏗️ Build Final ObsidianOS XCArchive
        run: |
          cd ios
          WORKSPACE_NAME=$(ls | grep "\.xcworkspace" | head -n 1)
          SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)
          
          xcodebuild archive \
            -workspace "$WORKSPACE_NAME" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath $PWD/build/ObsidianOS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: 📦 Package Sideload-Ready .ipa Payload
        run: |
          cd ios/build
          mkdir -p Payload
          
          # Cerchiamo l'applicazione generata ObsidianOS.app
          APP_DIR=$(ls ObsidianOS.xcarchive/Products/Applications/ | head -n 1)
          cp -R "ObsidianOS.xcarchive/Products/Applications/$APP_DIR" Payload/
          
          # Comprimiamo brutalmente il payload. AltStore ignorerà il CODE_SIGNING mancante firmando al volo.
          zip -r obsidian.ipa Payload

      - name: 📤 Upload Native .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidian
          path: ios/build/obsidian.ipa
          retention-days: 7