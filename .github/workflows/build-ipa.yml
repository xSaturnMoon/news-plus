name: Build IPA (Unsigned)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Prebuild
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          # Proviamo a forzare l'installazione dei pod se lo workspace non esiste
          if [ ! -d "*.xcworkspace" ]; then
            pod install
          fi

      - name: Debug - List Files
        run: |
          echo "Contenuto cartella ios:"
          ls -la ios/

      - name: Build App (Unsigned)
        run: |
          cd ios
          
          # Trova lo schema (solitamente news o newsplus)
          SCHEME=$(ls -d *.xcodeproj | sed 's/\.xcodeproj//' | head -n 1)
          echo "Building scheme: $SCHEME"
          
          # Cerchiamo lo workspace in modo più sicuro
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          
          if [ -n "$WORKSPACE" ]; then
            echo "Found workspace: $WORKSPACE"
            BUILD_ARG="-workspace $WORKSPACE"
          else
            PROJECT=$(find . -maxdepth 1 -name "*.xcodeproj" | head -n 1)
            echo "Working with project: $PROJECT"
            BUILD_ARG="-project $PROJECT"
          fi
          
          xcodebuild $BUILD_ARG \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Create Payload
        run: |
          mkdir -p Payload
          # Cerchiamo il file .app indipendentemente dal nome dello schema
          find ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} Payload/ \;

      - name: Create IPA
        run: zip -r news-plus.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-plus-ipa
          path: news-plus.ipa
