name: Build IPA (Unsigned)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Prebuild
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          # Proviamo a forzare l'installazione dei pod per generare lo workspace
          pod install

      - name: Debug - List Files
        run: |
          echo "Contenuto cartella ios:"
          ls -la ios/

      - name: Build App (Unsigned)
        run: |
          cd ios
          
          # Individua i file importanti senza usare glob diretti nelle variabili
          WORKSPACE_FILE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -n 1)
          PROJECT_FILE=$(find . -name "*.xcodeproj" -maxdepth 1 | head -n 1)
          
          # Almeno uno dei due deve esistere
          if [ -z "$PROJECT_FILE" ]; then
            echo "ERRORE: Nessun file .xcodeproj trovato!"
            exit 1
          fi

          # Individua lo schema (nome del progetto senza estensione)
          SCHEME=$(basename "$PROJECT_FILE" .xcodeproj)
          echo "Building scheme: $SCHEME"
          
          if [ -n "$WORKSPACE_FILE" ]; then
            echo "Found workspace: $WORKSPACE_FILE"
            BUILD_CONFIG="-workspace $WORKSPACE_FILE"
          else
            echo "Workspace not found, using project: $PROJECT_FILE"
            BUILD_CONFIG="-project $PROJECT_FILE"
          fi
          
          xcodebuild $BUILD_CONFIG \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Create Payload
        run: |
          mkdir -p Payload
          # Cerchiamo il file .app generato 
          find ios/build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} Payload/ \;

      - name: Create IPA
        run: zip -r news-plus.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-plus-ipa
          path: news-plus.ipa
